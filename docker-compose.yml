services:
  backend:
    build:
      context: ./src/backend
    ports:
      - "8000:8000"
    mem_limit: 4g
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
    volumes:
      - session-data:/app/data/sessions

  frontend:
    build:
      context: ./src/frontend
    ports:
      - "3000:3000"
    mem_limit: 512m
    depends_on:
      - backend

volumes:
  session-data:
