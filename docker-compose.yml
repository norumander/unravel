services:
  backend:
    build:
      context: ./src/backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}

  frontend:
    build:
      context: ./src/frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
